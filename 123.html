<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>销售数据可视化看板</title>
  <!-- 引入第三方库 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <!-- Tailwind 配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            success: '#00B42A',
            warning: '#FF7D00',
            danger: '#F53F3F',
            dark: '#1D2129',
            light: '#F2F3F5'
          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .card-shadow {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
      .transition-card {
        transition: all 0.3s ease;
      }
      .hover-card:hover {
        transform: translateY(-4px);
      }
    }
  </style>
</head>
<body class="bg-gray-50 font-inter text-dark min-h-screen">
  <!-- 顶部导航 -->
  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <i class="fa fa-bar-chart text-primary text-2xl"></i>
        <h1 class="text-xl md:text-2xl font-bold text-primary">销售数据可视化看板</h1>
      </div>
      <div class="flex items-center gap-4">
        <div class="hidden md:flex items-center gap-2 text-gray-500">
          <i class="fa fa-calendar"></i>
          <span id="current-date">加载中...</span>
        </div>
        <button id="refresh-btn" class="bg-primary/10 hover:bg-primary/20 text-primary px-3 py-1.5 rounded-md flex items-center gap-1 transition-all">
          <i class="fa fa-refresh"></i>
          <span class="hidden md:inline">刷新数据</span>
        </button>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="container mx-auto px-4 py-6">
    <!-- 加载状态 -->
    <div id="loading" class="fixed inset-0 bg-white/80 flex items-center justify-center z-50">
      <div class="text-center">
        <div class="inline-block w-12 h-12 border-4 border-primary/30 border-t-primary rounded-full animate-spin"></div>
        <p class="mt-3 text-gray-600">数据加载中...</p>
      </div>
    </div>

    <!-- 数据概览卡片 -->
    <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-6">
      <div id="total-sales-card" class="bg-white rounded-lg p-5 card-shadow hover-card transition-card">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-gray-500 text-sm">总销售额</p>
            <h3 class="text-2xl font-bold mt-1" id="total-sales">--</h3>
            <p class="text-success text-xs mt-2 flex items-center">
              <i class="fa fa-arrow-up mr-1"></i>
              <span id="sales-growth">--%</span>
              <span class="text-gray-500 ml-1">较上月</span>
            </p>
          </div>
          <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
            <i class="fa fa-line-chart text-primary"></i>
          </div>
        </div>
      </div>

      <div id="order-count-card" class="bg-white rounded-lg p-5 card-shadow hover-card transition-card">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-gray-500 text-sm">订单总数</p>
            <h3 class="text-2xl font-bold mt-1" id="order-count">--</h3>
            <p class="text-success text-xs mt-2 flex items-center">
              <i class="fa fa-arrow-up mr-1"></i>
              <span id="order-growth">--%</span>
              <span class="text-gray-500 ml-1">较上月</span>
            </p>
          </div>
          <div class="w-10 h-10 rounded-full bg-warning/10 flex items-center justify-center">
            <i class="fa fa-shopping-cart text-warning"></i>
          </div>
        </div>
      </div>

      <div id="customer-card" class="bg-white rounded-lg p-5 card-shadow hover-card transition-card">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-gray-500 text-sm">客户总数</p>
            <h3 class="text-2xl font-bold mt-1" id="customer-count">--</h3>
            <p class="text-success text-xs mt-2 flex items-center">
              <i class="fa fa-arrow-up mr-1"></i>
              <span id="customer-growth">--%</span>
              <span class="text-gray-500 ml-1">较上月</span>
            </p>
          </div>
          <div class="w-10 h-10 rounded-full bg-success/10 flex items-center justify-center">
            <i class="fa fa-users text-success"></i>
          </div>
        </div>
      </div>

      <div id="avg-order-card" class="bg-white rounded-lg p-5 card-shadow hover-card transition-card">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-gray-500 text-sm">客单价</p>
            <h3 class="text-2xl font-bold mt-1" id="avg-order">--</h3>
            <p class="text-danger text-xs mt-2 flex items-center">
              <i class="fa fa-arrow-down mr-1"></i>
              <span id="avg-order-growth">--%</span>
              <span class="text-gray-500 ml-1">较上月</span>
            </p>
          </div>
          <div class="w-10 h-10 rounded-full bg-danger/10 flex items-center justify-center">
            <i class="fa fa-money text-danger"></i>
          </div>
        </div>
      </div>
    </section>

    <!-- 图表区域 -->
    <section class="grid grid-cols-1 lg:grid-cols-3 gap-5 mb-6">
      <!-- 销售趋势图 -->
      <div class="bg-white rounded-lg p-5 card-shadow lg:col-span-2">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-bold text-lg">销售趋势分析</h2>
          <div class="text-sm text-gray-500">近12个月</div>
        </div>
        <div class="h-80">
          <canvas id="sales-trend-chart"></canvas>
        </div>
      </div>

      <!-- 产品分类占比 -->
      <div class="bg-white rounded-lg p-5 card-shadow">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-bold text-lg">产品分类占比</h2>
        </div>
        <div class="h-80">
          <canvas id="category-pie-chart"></canvas>
        </div>
      </div>
    </section>

    <!-- 销售排行榜 -->
    <section class="bg-white rounded-lg p-5 card-shadow mb-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-bold text-lg">产品销售排行榜</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="border-b border-gray-200">
              <th class="pb-3 text-gray-500 font-medium">排名</th>
              <th class="pb-3 text-gray-500 font-medium">产品名称</th>
              <th class="pb-3 text-gray-500 font-medium">分类</th>
              <th class="pb-3 text-gray-500 font-medium">销售额</th>
              <th class="pb-3 text-gray-500 font-medium">销量</th>
            </tr>
          </thead>
          <tbody id="ranking-table">
            <tr class="border-b border-gray-100">
              <td colspan="5" class="py-4 text-center text-gray-500">加载中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="bg-white mt-8 py-4 border-t border-gray-200">
    <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
      <p>© 2025 销售数据可视化看板 | 数据实时更新</p>
    </div>
  </footer>

  <script>
    // 初始化当前日期
    document.getElementById('current-date').textContent = new Date().toLocaleDateString('zh-CN', {
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });

    // 全局图表实例
    let salesChart, categoryChart;

    // 初始化函数
    async function initDashboard() {
      try {
        // 显示加载
        document.getElementById('loading').classList.remove('hidden');
        
        // 获取数据 - 这里替换为你的真实接口地址
        const data = await fetchSalesData();
        
        // 渲染数据
        renderOverview(data.overview);
        renderSalesTrend(data.trend);
        renderCategoryChart(data.categories);
        renderRankingTable(data.ranking);
        
        // 隐藏加载
        document.getElementById('loading').classList.add('hidden');
      } catch (error) {
        console.error('数据加载失败:', error);
        document.getElementById('loading').innerHTML = `
          <div class="text-center">
            <i class="fa fa-exclamation-circle text-danger text-3xl mb-3"></i>
            <p class="text-danger">数据加载失败，请刷新重试</p>
            <button onclick="location.reload()" class="mt-3 bg-primary text-white px-4 py-2 rounded">重新加载</button>
          </div>
        `;
      }
    }

    // 模拟接口获取数据 - 实际使用时替换为真实接口请求
    async function fetchSalesData() {
      // 真实环境替换为：
      // const response = await fetch('https://your-api.com/sales-data');
      // return await response.json();
      
      // 模拟接口延迟
      await new Promise(resolve => setTimeout(resolve, 1000));
      
      // 模拟接口返回数据结构
      return {
        overview: {
          totalSales: "12,892,320",
          salesGrowth: 26.8,
          orderCount: "15,682",
          orderGrowth: 18.5,
          customerCount: "8,965",
          customerGrowth: 15.2,
          avgOrder: "822.5",
          avgOrderGrowth: 5.3
        },
        trend: {
          months: ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"],
          sales: [850000, 920000, 980000, 1050000, 1120000, 1280000, 1350000, 1420000, 1580000, 1650000, 1720000, 1890000]
        },
        categories: {
          names: ["电子产品", "服装服饰", "食品饮料", "家居用品", "美妆护肤"],
          values: [35, 25, 15, 12, 13]
        },
        ranking: [
          { rank: 1, name: "智能手机 Pro Max", category: "电子产品", sales: "2,580,000", volume: "1,258" },
          { rank: 2, name: "时尚连衣裙套装", category: "服装服饰", sales: "1,850,000", volume: "2,360" },
          { rank: 3, name: "智能手表", category: "电子产品", sales: "1,560,000", volume: "3,250" },
          { rank: 4, name: "家用咖啡机", category: "家居用品", sales: "1,250,000", volume: "1,890" },
          { rank: 5, name: "保湿护肤套装", category: "美妆护肤", sales: "980,000", volume: "2,560" }
        ]
      };
    }

    // 渲染概览数据
    function renderOverview(data) {
      document.getElementById('total-sales').textContent = '¥' + data.totalSales;
      document.getElementById('sales-growth').textContent = data.salesGrowth + '%';
      
      document.getElementById('order-count').textContent = data.orderCount;
      document.getElementById('order-growth').textContent = data.orderGrowth + '%';
      
      document.getElementById('customer-count').textContent = data.customerCount;
      document.getElementById('customer-growth').textContent = data.customerGrowth + '%';
      
      document.getElementById('avg-order').textContent = '¥' + data.avgOrder;
      document.getElementById('avg-order-growth').textContent = data.avgOrderGrowth + '%';
    }

    // 渲染销售趋势图
    function renderSalesTrend(data) {
      const ctx = document.getElementById('sales-trend-chart').getContext('2d');
      
      // 销毁旧图表
      if (salesChart) salesChart.destroy();
      
      salesChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.months,
          datasets: [{
            label: '销售额',
            data: data.sales,
            borderColor: '#165DFF',
            backgroundColor: 'rgba(22, 93, 255, 0.1)',
            tension: 0.4,
            fill: true,
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: '#fff',
            pointBorderColor: '#165DFF'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.7)',
              padding: 10,
              titleFont: {
                size: 12
              },
              callbacks: {
                label: function(context) {
                  return '销售额: ¥' + context.parsed.y.toLocaleString();
                }
              }
            }
          },
          scales: {
            x: {
              grid: {
                display: false
              }
            },
            y: {
              beginAtZero: true,
              ticks: {
                callback: function(value) {
                  return '¥' + (value / 10000) + '万';
                }
              }
            }
          }
        }
      });
    }

    // 渲染分类饼图
    function renderCategoryChart(data) {
      const ctx = document.getElementById('category-pie-chart').getContext('2d');
      
      // 销毁旧图表
      if (categoryChart) categoryChart.destroy();
      
      const colors = ['#165DFF', '#FF7D00', '#00B42A', '#722ED1', '#F53F3F'];
      
      categoryChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: data.names,
          datasets: [{
            data: data.values,
            backgroundColor: colors,
            borderWidth: 0,
            hoverOffset: 5
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              padding: 20
            }
          }
        }
      });
    }

    // 渲染排行榜表格
    function renderRankingTable(data) {
      const table = document.getElementById('ranking-table');
      let html = '';
      
      data.forEach(item => {
        const rankClass = item.rank <= 3 ? 'text-primary font-bold' : '';
        
        html += `
          <tr class="border-b border-gray-100 hover:bg-gray-50">
            <td class="py-3 ${rankClass}">${item.rank}</td>
            <td class="py-3 font-medium">${item.name}</td>
            <td class="py-3">
              <span class="bg-gray-100 px-2 py-1 rounded text-xs">${item.category}</span>
            </td>
            <td class="py-3 font-medium">¥${item.sales}</td>
            <td class="py-3">${item.volume}</td>
          </tr>
        `;
      });
      
      table.innerHTML = html;
    }

    // 刷新按钮事件
    document.getElementById('refresh-btn').addEventListener('click', initDashboard);

    // 页面加载完成后初始化
    window.addEventListener('DOMContentLoaded', initDashboard);
  </script>
</body>
</html>
